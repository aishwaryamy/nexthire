services:
  - type: web
    name: nexthire
    runtime: python
    rootDir: backend
    buildCommand: bash ../build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexthire-db
          property: connectionString
      - key: STATIC_DIR
        value: static
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: nexthire-db
    databaseName: nexthire
    plan: free
